<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hex-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="30%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="metal-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="amber-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inner-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Hexagon frame - dark with amber edge glow -->
  <path d="M32 3 L56 17.5 L56 48.5 L32 63 L8 48.5 L8 17.5 Z"
        fill="url(#hex-fill)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Inner hex highlight -->
  <path d="M32 6 L53.5 19 L53.5 47 L32 60 L10.5 47 L10.5 19 Z"
        fill="none" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- === TECH HORNET ROBOT === -->

  <!-- Head - rounded rectangle like 3D robot -->
  <rect x="22" y="11" width="20" height="14" rx="5" ry="5"
        fill="url(#metal)" stroke="#52525b" stroke-width="0.6"/>
  <!-- Head visor slit -->
  <rect x="24" y="15" width="16" height="6" rx="3" ry="3"
        fill="#0a0a0b" stroke="#3f3f46" stroke-width="0.4"/>

  <!-- Eyes - glowing amber in visor -->
  <ellipse cx="28.5" cy="18" rx="2.8" ry="2" fill="url(#eye-glow)" filter="url(#glow)"/>
  <ellipse cx="35.5" cy="18" rx="2.8" ry="2" fill="url(#eye-glow)" filter="url(#glow)"/>
  <!-- Eye cores -->
  <ellipse cx="28.5" cy="18" rx="1.2" ry="0.9" fill="#fff" opacity="0.9"/>
  <ellipse cx="35.5" cy="18" rx="1.2" ry="0.9" fill="#fff" opacity="0.9"/>

  <!-- Antennae - tech style -->
  <line x1="26" y1="11" x2="21" y2="5" stroke="#52525b" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="11" x2="43" y2="5" stroke="#52525b" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Antenna tips - glowing -->
  <circle cx="21" cy="5" r="1.5" fill="#f59e0b" filter="url(#glow-sm)"/>
  <circle cx="43" cy="5" r="1.5" fill="#f59e0b" filter="url(#glow-sm)"/>

  <!-- Thorax / Body core -->
  <rect x="24" y="26" width="16" height="10" rx="4" ry="4"
        fill="url(#metal-light)" stroke="#52525b" stroke-width="0.5"/>

  <!-- Neck connector -->
  <rect x="29" y="24.5" width="6" height="3" rx="1.5" ry="1.5"
        fill="#3f3f46" stroke="#52525b" stroke-width="0.3"/>

  <!-- AI core on thorax - glowing hexagon -->
  <polygon points="32,28 35,29.5 35,32.5 32,34 29,32.5 29,29.5"
           fill="none" stroke="#f59e0b" stroke-width="0.8" filter="url(#glow-sm)"/>
  <circle cx="32" cy="31" r="1.2" fill="#fbbf24" filter="url(#glow-sm)"/>

  <!-- Wings - translucent tech panels -->
  <path d="M24 28 L14 22 L12 26 L22 30" fill="rgba(245,158,11,0.06)"
        stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.4"/>
  <path d="M40 28 L50 22 L52 26 L42 30" fill="rgba(245,158,11,0.06)"
        stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Wing inner lines -->
  <line x1="23" y1="28.5" x2="14" y2="24" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.25"/>
  <line x1="41" y1="28.5" x2="50" y2="24" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.25"/>

  <!-- Abdomen - segmented armor plates -->
  <rect x="25" y="37" width="14" height="5" rx="3" ry="2"
        fill="url(#metal)" stroke="#52525b" stroke-width="0.4"/>
  <!-- Stripe 1 -->
  <rect x="25.5" y="38" width="13" height="1.2" rx="0.6"
        fill="#f59e0b" opacity="0.8"/>

  <rect x="26" y="43" width="12" height="4.5" rx="2.5" ry="2"
        fill="url(#metal)" stroke="#52525b" stroke-width="0.4"/>
  <!-- Stripe 2 -->
  <rect x="26.5" y="44" width="11" height="1.2" rx="0.6"
        fill="#fbbf24" opacity="0.9"/>

  <rect x="27.5" y="48.5" width="9" height="3.5" rx="2" ry="1.5"
        fill="url(#metal)" stroke="#52525b" stroke-width="0.4"/>
  <!-- Stripe 3 -->
  <rect x="28" y="49.2" width="8" height="1" rx="0.5"
        fill="#d97706" opacity="0.7"/>

  <!-- Stinger - energy weapon -->
  <line x1="32" y1="52" x2="32" y2="57" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-sm)"/>
  <circle cx="32" cy="57.5" r="1" fill="#fbbf24" filter="url(#glow)"/>

  <!-- Legs - robotic joints -->
  <line x1="26" y1="38" x2="19" y2="42" stroke="#3f3f46" stroke-width="1" stroke-linecap="round"/>
  <circle cx="19" cy="42" r="0.8" fill="#52525b"/>
  <line x1="19" y1="42" x2="17" y2="47" stroke="#3f3f46" stroke-width="0.8" stroke-linecap="round"/>

  <line x1="38" y1="38" x2="45" y2="42" stroke="#3f3f46" stroke-width="1" stroke-linecap="round"/>
  <circle cx="45" cy="42" r="0.8" fill="#52525b"/>
  <line x1="45" y1="42" x2="47" y2="47" stroke="#3f3f46" stroke-width="0.8" stroke-linecap="round"/>

  <line x1="26.5" y1="44" x2="20" y2="49" stroke="#3f3f46" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="37.5" y1="44" x2="44" y2="49" stroke="#3f3f46" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Circuit detail lines on hex -->
  <line x1="12" y1="20" x2="12" y2="15" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="12" y1="15" x2="16" y2="13" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="52" y1="20" x2="52" y2="15" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="52" y1="15" x2="48" y2="13" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="12" y1="46" x2="16" y2="50" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="52" y1="46" x2="48" y2="50" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.2"/>
</svg>