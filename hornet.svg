<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Metallic body gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="30%" style="stop-color:#1a1a2e"/>
      <stop offset="60%" style="stop-color:#12121e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <!-- Metallic highlight -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a6e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0"/>
    </linearGradient>
    <!-- Amber eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#fef3c7;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#fbbf24;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Amber glow spread -->
    <radialGradient id="eyeSpread" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Body stripe gradient -->
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Stinger gradient -->
    <linearGradient id="stinger" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Wing shimmer -->
    <linearGradient id="wingShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.15"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerLight">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Whole hornet floating animation -->
  <g transform="translate(200,250)">
    <animateTransform attributeName="transform" type="translate"
      values="200,250;200,238;200,250" dur="4s" repeatCount="indefinite"/>

    <!-- Ambient glow behind -->
    <ellipse cx="0" cy="0" rx="160" ry="180" fill="url(#ambientGlow)">
      <animate attributeName="rx" values="150;170;150" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ====== WINGS ====== -->
    <!-- Left wing -->
    <g filter="url(#innerLight)" opacity="0.7">
      <path d="M-40,-60 Q-120,-140 -150,-100 Q-160,-70 -120,-40 Q-80,-20 -40,-40 Z"
            fill="url(#wingShimmer)" stroke="#f59e0b" stroke-width="0.8">
        <animate attributeName="d"
          values="M-40,-60 Q-120,-140 -150,-100 Q-160,-70 -120,-40 Q-80,-20 -40,-40 Z;
                  M-40,-55 Q-115,-135 -145,-95 Q-155,-65 -118,-38 Q-78,-18 -40,-38 Z;
                  M-40,-60 Q-120,-140 -150,-100 Q-160,-70 -120,-40 Q-80,-20 -40,-40 Z"
          dur="0.8s" repeatCount="indefinite"/>
      </path>
      <!-- Wing vein -->
      <line x1="-45" y1="-50" x2="-130" y2="-90" stroke="#f59e0b" stroke-width="0.4" opacity="0.3"/>
    </g>
    <!-- Right wing -->
    <g filter="url(#innerLight)" opacity="0.7">
      <path d="M40,-60 Q120,-140 150,-100 Q160,-70 120,-40 Q80,-20 40,-40 Z"
            fill="url(#wingShimmer)" stroke="#f59e0b" stroke-width="0.8">
        <animate attributeName="d"
          values="M40,-60 Q120,-140 150,-100 Q160,-70 120,-40 Q80,-20 40,-40 Z;
                  M40,-55 Q115,-135 145,-95 Q155,-65 118,-38 Q78,-18 40,-38 Z;
                  M40,-60 Q120,-140 150,-100 Q160,-70 120,-40 Q80,-20 40,-40 Z"
          dur="0.8s" repeatCount="indefinite" begin="0.05s"/>
      </path>
      <line x1="45" y1="-50" x2="130" y2="-90" stroke="#f59e0b" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- ====== HEAD (rounded cube like reference) ====== -->
    <g filter="url(#shadow)">
      <!-- Head main body - rounded rectangle -->
      <rect x="-55" y="-115" width="110" height="90" rx="22" ry="22" fill="url(#metal)"/>
      <!-- Metallic highlight on top-left -->
      <rect x="-55" y="-115" width="110" height="90" rx="22" ry="22" fill="url(#metalHighlight)"/>
      <!-- Edge highlight -->
      <rect x="-53" y="-113" width="106" height="86" rx="20" ry="20" fill="none" stroke="#3a3a5e" stroke-width="0.5"/>

      <!-- Visor / face plate -->
      <rect x="-42" y="-105" width="84" height="55" rx="14" ry="14" fill="#0d0d18" stroke="#2a2a4e" stroke-width="1.5"/>

      <!-- Eye glow spread on face -->
      <ellipse cx="0" cy="-80" rx="50" ry="25" fill="url(#eyeSpread)" opacity="0.3">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Left eye -->
      <g filter="url(#glow)">
        <ellipse cx="-18" cy="-80" rx="14" ry="11" fill="url(#eyeGlow)">
          <animate attributeName="ry" values="11;12;11" dur="3s" repeatCount="indefinite"/>
        </ellipse>
        <!-- Eye glint -->
        <ellipse cx="-22" cy="-84" rx="4" ry="3" fill="white" opacity="0.7"/>
      </g>

      <!-- Right eye -->
      <g filter="url(#glow)">
        <ellipse cx="18" cy="-80" rx="14" ry="11" fill="url(#eyeGlow)">
          <animate attributeName="ry" values="11;12;11" dur="3s" repeatCount="indefinite" begin="0.2s"/>
        </ellipse>
        <!-- Eye glint -->
        <ellipse cx="14" cy="-84" rx="4" ry="3" fill="white" opacity="0.7"/>
      </g>

      <!-- Rivets/bolts on head (like reference) -->
      <circle cx="-48" cy="-108" r="4" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="48" cy="-108" r="4" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="-48" cy="-32" r="4" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="48" cy="-32" r="4" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <!-- Top rivets -->
      <circle cx="-20" cy="-118" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="20" cy="-118" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>

      <!-- Antennae -->
      <g filter="url(#glow)">
        <path d="M-20,-115 Q-30,-145 -25,-160" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="-25" cy="-162" r="5" fill="#fbbf24">
          <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <path d="M20,-115 Q30,-145 25,-160" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="25" cy="-162" r="5" fill="#fbbf24">
          <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
      </g>
    </g>

    <!-- ====== THORAX (rounded cube) ====== -->
    <g filter="url(#shadow)">
      <rect x="-45" y="-22" width="90" height="65" rx="18" ry="18" fill="url(#metal)"/>
      <rect x="-45" y="-22" width="90" height="65" rx="18" ry="18" fill="url(#metalHighlight)"/>
      <rect x="-43" y="-20" width="86" height="61" rx="16" ry="16" fill="none" stroke="#3a3a5e" stroke-width="0.5"/>

      <!-- AI core on chest -->
      <g filter="url(#glow)">
        <polygon points="0,-2 12,5 12,17 0,24 -12,17 -12,5" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8">
          <animateTransform attributeName="transform" type="rotate" from="0 0 11" to="360 0 11" dur="10s" repeatCount="indefinite"/>
        </polygon>
        <circle cx="0" cy="11" r="5" fill="#f59e0b" opacity="0.7">
          <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Thorax rivets -->
      <circle cx="-38" cy="-15" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="38" cy="-15" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="-38" cy="36" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="38" cy="36" r="3.5" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>

      <!-- Circuit lines on thorax -->
      <g stroke="#f59e0b" stroke-width="0.5" opacity="0.2">
        <line x1="-30" y1="0" x2="-12" y2="5"/>
        <line x1="30" y1="0" x2="12" y2="5"/>
        <line x1="-30" y1="22" x2="-12" y2="17"/>
        <line x1="30" y1="22" x2="12" y2="17"/>
      </g>
    </g>

    <!-- ====== ABDOMEN (rounded with hornet stripes) ====== -->
    <g filter="url(#shadow)">
      <!-- Abdomen shape -->
      <path d="M-40,48 Q-48,48 -48,60 L-48,100 Q-48,115 -38,128 Q-20,150 0,158 Q20,150 38,128 Q48,115 48,100 L48,60 Q48,48 40,48 Z"
            fill="url(#metal)"/>
      <path d="M-40,48 Q-48,48 -48,60 L-48,100 Q-48,115 -38,128 Q-20,150 0,158 Q20,150 38,128 Q48,115 48,100 L48,60 Q48,48 40,48 Z"
            fill="url(#metalHighlight)"/>

      <!-- Hornet stripes! -->
      <rect x="-44" y="60" width="88" height="12" rx="3" fill="url(#stripeGrad)" opacity="0.85"/>
      <rect x="-42" y="82" width="84" height="12" rx="3" fill="url(#stripeGrad)" opacity="0.85"/>
      <rect x="-36" y="104" width="72" height="11" rx="3" fill="url(#stripeGrad)" opacity="0.85"/>
      <path d="M-24,126 Q0,135 24,126 L22,132 Q0,142 -22,132 Z" fill="url(#stripeGrad)" opacity="0.85"/>

      <!-- Abdomen rivets -->
      <circle cx="-40" cy="55" r="3" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>
      <circle cx="40" cy="55" r="3" fill="#1e1e32" stroke="#2a2a4e" stroke-width="1"/>

      <!-- Abdomen edge -->
      <path d="M-38,50 Q-46,50 -46,61 L-46,99 Q-46,114 -36,127 Q-19,148 0,156 Q19,148 36,127 Q46,114 46,99 L46,61 Q46,50 38,50 Z"
            fill="none" stroke="#3a3a5e" stroke-width="0.5"/>
    </g>

    <!-- ====== STINGER ====== -->
    <g filter="url(#glow)">
      <polygon points="0,158 8,162 0,195 -8,162" fill="url(#stinger)"/>
      <!-- Stinger energy drip -->
      <line x1="0" y1="195" x2="0" y2="210" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
        <animate attributeName="y2" values="205;215;205" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.2s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- ====== LEGS (small, robotic) ====== -->
    <g stroke="#2a2a4e" stroke-width="3" fill="none" stroke-linecap="round">
      <!-- Left legs -->
      <path d="M-40,5 L-65,15 L-75,35"/>
      <path d="M-42,20 L-68,35 L-78,55"/>
      <path d="M-40,35 L-62,50 L-70,70"/>
      <!-- Right legs -->
      <path d="M40,5 L65,15 L75,35"/>
      <path d="M42,20 L68,35 L78,55"/>
      <path d="M40,35 L62,50 L70,70"/>
      <!-- Leg joints as small bolts -->
      <g fill="#1e1e32" stroke="#3a3a5e" stroke-width="1">
        <circle cx="-65" cy="15" r="3"/>
        <circle cx="-68" cy="35" r="3"/>
        <circle cx="-62" cy="50" r="3"/>
        <circle cx="65" cy="15" r="3"/>
        <circle cx="68" cy="35" r="3"/>
        <circle cx="62" cy="50" r="3"/>
      </g>
    </g>

    <!-- ====== FLOATING PARTICLES ====== -->
    <g opacity="0.4">
      <circle cx="-90" cy="-50" r="2" fill="#f59e0b">
        <animate attributeName="cy" values="-50;-60;-50" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="95" cy="-80" r="1.5" fill="#fbbf24">
        <animate attributeName="cy" values="-80;-90;-80" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-80" cy="80" r="1.5" fill="#f59e0b">
        <animate attributeName="cy" values="80;70;80" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="85" cy="60" r="2" fill="#fbbf24">
        <animate attributeName="cy" values="60;50;60" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>